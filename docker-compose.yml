# Arquitetura:
#   - 4 Brokers MQTT independentes (um por setor) — sem ponto único de falha
#   - 4 Gerenciadores de Setor com algoritmo de Ricart-Agrawala
#   - 8 Drones distribuídos: 2 por setor
#   - 8 Sensores marítimos autônomos: 2 por setor (radar, boia, naval)
#   - 1 Monitor para visualização em tempo real 
#
# Distribuição de drones:
#   S1 → drone_a, drone_b   (broker_1 :1883)
#   S2 → drone_c, drone_d   (broker_2 :1884)
#   S3 → drone_e, drone_f   (broker_3 :1885)
#   S4 → drone_g, drone_h   (broker_4 :1886)
#
# Sensores por setor (todos radar + boia):
#   S1 → radar + boia
#   S2 → radar + boia
#   S3 → radar + boia
#   S4 → radar + boia

services:

  # ===========================================================================
  # BROKERS — um por setor, sem ponto único de falha
  # ===========================================================================

  broker_1:
    build: ./broker
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_1
    ports:
      - "1883:1883/tcp"
      - "1883:1883/udp"
    environment:
      BROKER_PORT: "1883"
    restart: unless-stopped

  broker_2:
    build: ./broker
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_2
    ports:
      - "1884:1883/tcp"
      - "1884:1883/udp"
    environment:
      BROKER_PORT: "1883"
    restart: unless-stopped

  broker_3:
    build: ./broker
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_3
    ports:
      - "1885:1883/tcp"
      - "1885:1883/udp"
    environment:
      BROKER_PORT: "1883"
    restart: unless-stopped

  broker_4:
    build: ./broker
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_4
    ports:
      - "1886:1883/tcp"
      - "1886:1883/udp"
    environment:
      BROKER_PORT: "1883"
    restart: unless-stopped

  # GERENCIADORES DE SETOR — Ricart-Agrawala para exclusão mútua distribuída
  #
  # PEERS: endereços RA dos outros 3 setores (TCP :5001)
  # DRONES: mapa completo drone_id:broker_host:broker_port para todos os 8 drones
  # ALL_BROKERS: todos os 4 brokers (para subscrever status de drones)

  sector_manager_1:
    build: ./sector_manager
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_1_manager
    depends_on: [broker_1, broker_2, broker_3, broker_4]
    environment:
      SECTOR_ID:     "1"
      LOCAL_BROKER:  "broker_1"
      BROKER_PORT:   "1883"
      RA_PORT:       "5001"
      PEERS:         "sector_manager_2:5001,sector_manager_3:5001,sector_manager_4:5001"
      DRONES:        "drone_a:broker_1:1883,drone_b:broker_1:1883,drone_c:broker_2:1883,drone_d:broker_2:1883,drone_e:broker_3:1883,drone_f:broker_3:1883,drone_g:broker_4:1883,drone_h:broker_4:1883"
      ALL_BROKERS:   "broker_1:1883,broker_2:1883,broker_3:1883,broker_4:1883"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "25"
      OCC_MAX:       "60"
    restart: unless-stopped

  sector_manager_2:
    build: ./sector_manager
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_2_manager
    depends_on: [broker_1, broker_2, broker_3, broker_4]
    environment:
      SECTOR_ID:     "2"
      LOCAL_BROKER:  "broker_2"
      BROKER_PORT:   "1883"
      RA_PORT:       "5001"
      PEERS:         "sector_manager_1:5001,sector_manager_3:5001,sector_manager_4:5001"
      DRONES:        "drone_a:broker_1:1883,drone_b:broker_1:1883,drone_c:broker_2:1883,drone_d:broker_2:1883,drone_e:broker_3:1883,drone_f:broker_3:1883,drone_g:broker_4:1883,drone_h:broker_4:1883"
      ALL_BROKERS:   "broker_1:1883,broker_2:1883,broker_3:1883,broker_4:1883"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "30"
      OCC_MAX:       "70"
    restart: unless-stopped

  sector_manager_3:
    build: ./sector_manager
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_3_manager
    depends_on: [broker_1, broker_2, broker_3, broker_4]
    environment:
      SECTOR_ID:     "3"
      LOCAL_BROKER:  "broker_3"
      BROKER_PORT:   "1883"
      RA_PORT:       "5001"
      PEERS:         "sector_manager_1:5001,sector_manager_2:5001,sector_manager_4:5001"
      DRONES:        "drone_a:broker_1:1883,drone_b:broker_1:1883,drone_c:broker_2:1883,drone_d:broker_2:1883,drone_e:broker_3:1883,drone_f:broker_3:1883,drone_g:broker_4:1883,drone_h:broker_4:1883"
      ALL_BROKERS:   "broker_1:1883,broker_2:1883,broker_3:1883,broker_4:1883"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "20"
      OCC_MAX:       "55"
    restart: unless-stopped

  sector_manager_4:
    build: ./sector_manager
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_4_manager
    depends_on: [broker_1, broker_2, broker_3, broker_4]
    environment:
      SECTOR_ID:     "4"
      LOCAL_BROKER:  "broker_4"
      BROKER_PORT:   "1883"
      RA_PORT:       "5001"
      PEERS:         "sector_manager_1:5001,sector_manager_2:5001,sector_manager_3:5001"
      DRONES:        "drone_a:broker_1:1883,drone_b:broker_1:1883,drone_c:broker_2:1883,drone_d:broker_2:1883,drone_e:broker_3:1883,drone_f:broker_3:1883,drone_g:broker_4:1883,drone_h:broker_4:1883"
      ALL_BROKERS:   "broker_1:1883,broker_2:1883,broker_3:1883,broker_4:1883"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "25"
      OCC_MAX:       "65"
    restart: unless-stopped

  # DRONES — 2 por setor

  drone_a:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_a
    depends_on: [broker_1]
    environment:
      DRONE_ID:     "drone_a"
      BROKER_HOST:  "broker_1"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_b:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_b
    depends_on: [broker_1]
    environment:
      DRONE_ID:     "drone_b"
      BROKER_HOST:  "broker_1"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_c:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_c
    depends_on: [broker_2]
    environment:
      DRONE_ID:     "drone_c"
      BROKER_HOST:  "broker_2"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_d:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_d
    depends_on: [broker_2]
    environment:
      DRONE_ID:     "drone_d"
      BROKER_HOST:  "broker_2"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_e:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_e
    depends_on: [broker_3]
    environment:
      DRONE_ID:     "drone_e"
      BROKER_HOST:  "broker_3"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_f:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_f
    depends_on: [broker_3]
    environment:
      DRONE_ID:     "drone_f"
      BROKER_HOST:  "broker_3"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_g:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_g
    depends_on: [broker_4]
    environment:
      DRONE_ID:     "drone_g"
      BROKER_HOST:  "broker_4"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_h:
    build: ./drone
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_h
    depends_on: [broker_4]
    environment:
      DRONE_ID:     "drone_h"
      BROKER_HOST:  "broker_4"
      BROKER_PORT:  "1883"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  # SENSORES — 2 por setor (radar + boia em todos)

  radar_1:
    build: ./sensors/radar
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_1
    depends_on: [broker_1]
    environment:
      BROKER_HOST: "broker_1"
      BROKER_PORT: "1883"
      SECTOR_ID:   "1"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_1:
    build: ./sensors/buoy
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_1
    depends_on: [broker_1]
    environment:
      BROKER_HOST: "broker_1"
      BROKER_PORT: "1883"
      SECTOR_ID:   "1"
      INTERVAL:    "6"
    restart: unless-stopped

  radar_2:
    build: ./sensors/radar
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_2
    depends_on: [broker_2]
    environment:
      BROKER_HOST: "broker_2"
      BROKER_PORT: "1883"
      SECTOR_ID:   "2"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_2:
    build: ./sensors/buoy
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_2
    depends_on: [broker_2]
    environment:
      BROKER_HOST: "broker_2"
      BROKER_PORT: "1883"
      SECTOR_ID:   "2"
      INTERVAL:    "6"
    restart: unless-stopped

  radar_3:
    build: ./sensors/radar
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_3
    depends_on: [broker_3]
    environment:
      BROKER_HOST: "broker_3"
      BROKER_PORT: "1883"
      SECTOR_ID:   "3"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_3:
    build: ./sensors/buoy
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_3
    depends_on: [broker_3]
    environment:
      BROKER_HOST: "broker_3"
      BROKER_PORT: "1883"
      SECTOR_ID:   "3"
      INTERVAL:    "6"
    restart: unless-stopped

  radar_4:
    build: ./sensors/radar
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_4
    depends_on: [broker_4]
    environment:
      BROKER_HOST: "broker_4"
      BROKER_PORT: "1883"
      SECTOR_ID:   "4"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_4:
    build: ./sensors/buoy
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_4
    depends_on: [broker_4]
    environment:
      BROKER_HOST: "broker_4"
      BROKER_PORT: "1883"
      SECTOR_ID:   "4"
      INTERVAL:    "6"
    restart: unless-stopped

  # MONITOR TUI
  #
  # Para visualizar:
  #   docker compose run --rm -it monitor
  #
  # Ou localmente:
  #   BROKER_1_HOST=localhost BROKER_1_PORT=1883 \
  #   BROKER_2_HOST=localhost BROKER_2_PORT=1884 \
  #   BROKER_3_HOST=localhost BROKER_3_PORT=1885 \
  #   BROKER_4_HOST=localhost BROKER_4_PORT=1886 \
  #   python monitor/monitor.py

  monitor:
    build: ./monitor
    image: yasmincsme/iot-estreito-monitor:latest
    container_name: monitor
    depends_on: [broker_1, broker_2, broker_3, broker_4]
    environment:
      BROKER_1_HOST: "broker_1"
      BROKER_1_PORT: "1883"
      BROKER_2_HOST: "broker_2"
      BROKER_2_PORT: "1883"
      BROKER_3_HOST: "broker_3"
      BROKER_3_PORT: "1883"
      BROKER_4_HOST: "broker_4"
      BROKER_4_PORT: "1883"
      TERM:          "xterm-256color"
    stdin_open: true
    tty: true
    restart: "no"
