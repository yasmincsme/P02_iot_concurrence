# Execução distribuída — rodar apenas os serviços indicados em cada máquina:
#
#   ladica02  (172.16.201.2):  docker compose up broker_1 sector_manager_1 drone_a drone_b radar_1 buoy_1
#   ladica03  (172.16.201.3):  docker compose up broker_2 sector_manager_2 drone_c drone_d radar_2 buoy_2
#   ladica010 (172.16.201.10): docker compose up broker_3 sector_manager_3 drone_e radar_3 buoy_3
#   ladica011 (172.16.201.11): docker compose up drone_f
#   ladica012 (172.16.201.12): docker compose up broker_4 sector_manager_4 drone_g radar_4 buoy_4
#   ladica016 (172.16.201.16): docker compose up drone_h
#
# Obs: drone_f (setor 3) roda em ladica011 mas conecta ao broker_3 em ladica010
#      drone_h (setor 4) roda em ladica016 mas conecta ao broker_4 em ladica012
#
# Portas expostas:
#   3001 — broker_1 (ladica02)
#   3002 — broker_2 (ladica03)
#   3003 — broker_3 (ladica010)
#   3004 — broker_4 (ladica012)
#   5001 — RA TCP de cada sector_manager

services:

  # ===========================================================================
  # BROKERS
  # ===========================================================================

  broker_1:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_1
    ports:
      - "3001:3001/tcp"
      - "3001:3001/udp"
    environment:
      BROKER_PORT: "3001"
    restart: unless-stopped

  broker_2:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_2
    ports:
      - "3002:3002/tcp"
      - "3002:3002/udp"
    environment:
      BROKER_PORT: "3002"
    restart: unless-stopped

  broker_3:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_3
    ports:
      - "3003:3003/tcp"
      - "3003:3003/udp"
    environment:
      BROKER_PORT: "3003"
    restart: unless-stopped

  broker_4:
    image: yasmincsme/iot-estreito-broker:latest
    container_name: broker_setor_4
    ports:
      - "3004:3004/tcp"
      - "3004:3004/udp"
    environment:
      BROKER_PORT: "3004"
    restart: unless-stopped

  # ===========================================================================
  # GERENCIADORES DE SETOR
  # ===========================================================================

  sector_manager_1:
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_1_manager
    ports:
      - "5001:5001"
    environment:
      SECTOR_ID:     "1"
      LOCAL_BROKER:  "172.16.201.2"
      BROKER_PORT:   "3001"
      RA_PORT:       "5001"
      PEERS:         "172.16.201.3:5001,172.16.201.10:5001,172.16.201.12:5001"
      DRONES:        "drone_a:172.16.201.2:3001,drone_b:172.16.201.2:3001,drone_c:172.16.201.3:3002,drone_d:172.16.201.3:3002,drone_e:172.16.201.10:3003,drone_f:172.16.201.10:3003,drone_g:172.16.201.12:3004,drone_h:172.16.201.12:3004"
      ALL_BROKERS:   "172.16.201.2:3001,172.16.201.3:3002,172.16.201.10:3003,172.16.201.12:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "25"
      OCC_MAX:       "60"
    restart: unless-stopped

  sector_manager_2:
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_2_manager
    ports:
      - "5001:5001"
    environment:
      SECTOR_ID:     "2"
      LOCAL_BROKER:  "172.16.201.3"
      BROKER_PORT:   "3002"
      RA_PORT:       "5001"
      PEERS:         "172.16.201.2:5001,172.16.201.10:5001,172.16.201.12:5001"
      DRONES:        "drone_a:172.16.201.2:3001,drone_b:172.16.201.2:3001,drone_c:172.16.201.3:3002,drone_d:172.16.201.3:3002,drone_e:172.16.201.10:3003,drone_f:172.16.201.10:3003,drone_g:172.16.201.12:3004,drone_h:172.16.201.12:3004"
      ALL_BROKERS:   "172.16.201.2:3001,172.16.201.3:3002,172.16.201.10:3003,172.16.201.12:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "30"
      OCC_MAX:       "70"
    restart: unless-stopped

  sector_manager_3:
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_3_manager
    ports:
      - "5001:5001"
    environment:
      SECTOR_ID:     "3"
      LOCAL_BROKER:  "172.16.201.10"
      BROKER_PORT:   "3003"
      RA_PORT:       "5001"
      PEERS:         "172.16.201.2:5001,172.16.201.3:5001,172.16.201.12:5001"
      DRONES:        "drone_a:172.16.201.2:3001,drone_b:172.16.201.2:3001,drone_c:172.16.201.3:3002,drone_d:172.16.201.3:3002,drone_e:172.16.201.10:3003,drone_f:172.16.201.10:3003,drone_g:172.16.201.12:3004,drone_h:172.16.201.12:3004"
      ALL_BROKERS:   "172.16.201.2:3001,172.16.201.3:3002,172.16.201.10:3003,172.16.201.12:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "20"
      OCC_MAX:       "55"
    restart: unless-stopped

  sector_manager_4:
    image: yasmincsme/iot-estreito-sector-manager:latest
    container_name: setor_4_manager
    ports:
      - "5001:5001"
    environment:
      SECTOR_ID:     "4"
      LOCAL_BROKER:  "172.16.201.12"
      BROKER_PORT:   "3004"
      RA_PORT:       "5001"
      PEERS:         "172.16.201.2:5001,172.16.201.3:5001,172.16.201.10:5001"
      DRONES:        "drone_a:172.16.201.2:3001,drone_b:172.16.201.2:3001,drone_c:172.16.201.3:3002,drone_d:172.16.201.3:3002,drone_e:172.16.201.10:3003,drone_f:172.16.201.10:3003,drone_g:172.16.201.12:3004,drone_h:172.16.201.12:3004"
      ALL_BROKERS:   "172.16.201.2:3001,172.16.201.3:3002,172.16.201.10:3003,172.16.201.12:3004"
      REPLY_TIMEOUT: "6.0"
      MISSION_MIN:   "20"
      MISSION_MAX:   "60"
      OCC_MIN:       "25"
      OCC_MAX:       "65"
    restart: unless-stopped

  # ===========================================================================
  # DRONES
  # ===========================================================================

  drone_a:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_a
    environment:
      DRONE_ID:     "drone_a"
      BROKER_HOST:  "172.16.201.2"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_b:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_b
    environment:
      DRONE_ID:     "drone_b"
      BROKER_HOST:  "172.16.201.2"
      BROKER_PORT:  "3001"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_c:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_c
    environment:
      DRONE_ID:     "drone_c"
      BROKER_HOST:  "172.16.201.3"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_d:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_d
    environment:
      DRONE_ID:     "drone_d"
      BROKER_HOST:  "172.16.201.3"
      BROKER_PORT:  "3002"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_e:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_e
    environment:
      DRONE_ID:     "drone_e"
      BROKER_HOST:  "172.16.201.10"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  # drone_f roda em ladica011 mas conecta ao broker_3 em ladica010
  drone_f:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_f
    environment:
      DRONE_ID:     "drone_f"
      BROKER_HOST:  "172.16.201.10"
      BROKER_PORT:  "3003"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  drone_g:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_g
    environment:
      DRONE_ID:     "drone_g"
      BROKER_HOST:  "172.16.201.12"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  # drone_h roda em ladica016 mas conecta ao broker_4 em ladica012
  drone_h:
    image: yasmincsme/iot-estreito-drone:latest
    container_name: drone_h
    environment:
      DRONE_ID:     "drone_h"
      BROKER_HOST:  "172.16.201.12"
      BROKER_PORT:  "3004"
      FAILURE_PROB: "0.08"
    restart: unless-stopped

  # ===========================================================================
  # SENSORES
  # ===========================================================================

  radar_1:
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_1
    environment:
      BROKER_HOST: "172.16.201.2"
      BROKER_PORT: "3001"
      SECTOR_ID:   "1"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_1:
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_1
    environment:
      BROKER_HOST: "172.16.201.2"
      BROKER_PORT: "3001"
      SECTOR_ID:   "1"
      INTERVAL:    "6"
    restart: unless-stopped

  radar_2:
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_2
    environment:
      BROKER_HOST: "172.16.201.3"
      BROKER_PORT: "3002"
      SECTOR_ID:   "2"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_2:
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_2
    environment:
      BROKER_HOST: "172.16.201.3"
      BROKER_PORT: "3002"
      SECTOR_ID:   "2"
      INTERVAL:    "6"
    restart: unless-stopped

  radar_3:
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_3
    environment:
      BROKER_HOST: "172.16.201.10"
      BROKER_PORT: "3003"
      SECTOR_ID:   "3"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_3:
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_3
    environment:
      BROKER_HOST: "172.16.201.10"
      BROKER_PORT: "3003"
      SECTOR_ID:   "3"
      INTERVAL:    "6"
    restart: unless-stopped

  radar_4:
    image: yasmincsme/iot-estreito-radar:latest
    container_name: radar_setor_4
    environment:
      BROKER_HOST: "172.16.201.12"
      BROKER_PORT: "3004"
      SECTOR_ID:   "4"
      INTERVAL:    "4"
    restart: unless-stopped

  buoy_4:
    image: yasmincsme/iot-estreito-buoy:latest
    container_name: buoy_setor_4
    environment:
      BROKER_HOST: "172.16.201.12"
      BROKER_PORT: "3004"
      SECTOR_ID:   "4"
      INTERVAL:    "6"
    restart: unless-stopped

  # ===========================================================================
  # MONITOR TUI — pode rodar em qualquer máquina
  # ===========================================================================

  monitor:
    image: yasmincsme/iot-estreito-monitor:latest
    container_name: monitor
    environment:
      BROKER_1_HOST: "172.16.201.2"
      BROKER_1_PORT: "3001"
      BROKER_2_HOST: "172.16.201.3"
      BROKER_2_PORT: "3002"
      BROKER_3_HOST: "172.16.201.10"
      BROKER_3_PORT: "3003"
      BROKER_4_HOST: "172.16.201.12"
      BROKER_4_PORT: "3004"
      TERM:          "xterm-256color"
    stdin_open: true
    tty: true
    restart: "no"
